# ============ Core / HTTP ============
quarkus.application.name=beatzmedia
quarkus.http.port=8080
quarkus.http.root-path=/
# First-line size backstop: 512 MB (generous for WAV/FLAC originals). The application layer
# CountingLimitingInputStream enforces the 500 MB domain limit on actual bytes. M-1 / ADD §5.1.
quarkus.http.limits.max-body-size=512M

# ============ Datasource (PRD §5.2) ============
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:beatz}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:beatz}
quarkus.hibernate-orm.database.generation=none
# The JDBC URL is intentionally NOT set at the top level. Behaviour by profile:
#   %test  — URL unset → Quarkus Dev Services auto-provisions a Testcontainers Postgres.
#   %dev   — points at the local compose db so `./mvnw quarkus:dev` works.
#   %prod  — supplied via the QUARKUS_DATASOURCE_JDBC_URL env var (compose / CI / prod).
# When QUARKUS_DATASOURCE_JDBC_URL is set, Quarkus auto-maps it to quarkus.datasource.jdbc.url
# and Dev Services stands down — so a CI/compose Postgres is used instead of a container.
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/beatzmedia
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}

# ============ Flyway (migrate on boot) ============
quarkus.flyway.migrate-at-start=${QUARKUS_FLYWAY_MIGRATE_AT_START:true}
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration
# Prod excludes seed repeatable scripts (R__*) — only versioned migrations
%prod.quarkus.flyway.locations=db/migration

# ============ OpenAPI / Swagger ============
quarkus.smallrye-openapi.info-title=BeatzClik Media API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=BeatzClik buy-to-own music streaming & marketplace API
quarkus.smallrye-openapi.store-schema-directory=target/openapi
# Bundle Swagger UI into the packaged jar (Quarkus only auto-includes it in dev mode).
# This makes /q/swagger-ui available in the Docker stack (dev/test profiles); prod keeps it off.
quarkus.swagger-ui.always-include=true
%prod.quarkus.swagger-ui.enable=false

# ============ Health / Observability (observability.md) ============
quarkus.smallrye-health.root-path=/q/health
# Permit health + metrics paths without a JWT (CI, Docker healthcheck, smoke.sh).
quarkus.http.auth.permission.health.paths=/q/health,/q/health/*,/q/metrics,/q/metrics/*
quarkus.http.auth.permission.health.policy=permit
quarkus.micrometer.export.prometheus.enabled=true

# ============ Object storage (S3 / MinIO placeholders, PRD §5.2) ============
beatz.s3.endpoint=${BEATZ_S3_ENDPOINT:http://localhost:9000}
beatz.s3.access-key=${BEATZ_S3_ACCESS_KEY:minioadmin}
beatz.s3.secret-key=${BEATZ_S3_SECRET_KEY:minioadmin}
beatz.s3.bucket-originals=${BEATZ_S3_BUCKET_ORIGINALS:beatz-media-originals}
beatz.s3.bucket-delivery=${BEATZ_S3_BUCKET_DELIVERY:beatz-media-delivery}
beatz.signed-url-ttl-seconds=${BEATZ_SIGNED_URL_TTL_SECONDS:300}
beatz.preview-seconds=${BEATZ_PREVIEW_SECONDS:30}

# ============ Playback (WU-PLY-1, ADD §9) ============
# Anti-inflation de-dup window: repeated POST /v1/tracks/:id/play for the same (account, track)
# within this window is a silent no-op (still 204), so a single playback start counts once.
beatz.playback.play-dedup-window-seconds=${BEATZ_PLAYBACK_DEDUP_WINDOW_SECONDS:30}

# ============ JWT (SmallRye, PRD §4.3 / §5.2) ============
# Public key is supplied via environment (BEATZ_JWT_PUBLIC_KEY_LOCATION) or
# the classpath resource below (dev/test keypair — never use in prod).
# Prod: set BEATZ_JWT_PUBLIC_KEY_LOCATION to a PEM file path or HTTPS URL.
mp.jwt.verify.publickey.location=${BEATZ_JWT_PUBLIC_KEY_LOCATION:classpath:jwt/dev-public.pem}
mp.jwt.verify.issuer=${BEATZ_JWT_ISSUER:https://beatzclik}
smallrye.jwt.sign.key.location=${BEATZ_JWT_PRIVATE_KEY_LOCATION:classpath:jwt/dev-private.pem}
beatz.jwt.access-ttl-seconds=${BEATZ_JWT_ACCESS_TTL:900}

# ============ Mailer (PRD §5.2) ============
quarkus.mailer.from=${QUARKUS_MAILER_FROM:no-reply@beatzclik.local}
quarkus.mailer.host=${QUARKUS_MAILER_HOST:localhost}
quarkus.mailer.port=${QUARKUS_MAILER_PORT:1025}
quarkus.mailer.start-tls=${QUARKUS_MAILER_START_TLS:DISABLED}
%prod.quarkus.mailer.start-tls=REQUIRED

# ============ SMS stub / provider (PRD §5.2, OQ-9) ============
beatz.sms.endpoint=${BEATZ_SMS_ENDPOINT:http://localhost:8026/send}
beatz.sms.api-key=${BEATZ_SMS_API_KEY:}

# ============ Payment providers (placeholders; secrets via env) ============
beatz.momo.mtn.base-url=${BEATZ_MOMO_MTN_BASE_URL:}
beatz.momo.mtn.api-key=${BEATZ_MOMO_MTN_API_KEY:}
beatz.momo.vodafone.api-key=${BEATZ_MOMO_VODAFONE_API_KEY:}
beatz.momo.airteltigo.api-key=${BEATZ_MOMO_AIRTELTIGO_API_KEY:}
beatz.card.api-key=${BEATZ_CARD_API_KEY:}
beatz.payment.webhook-secret=${BEATZ_PAYMENT_WEBHOOK_SECRET:dev-webhook-secret}
# Timeout poll (WU-PAY-2 / LLFR-PAYMENTS-01.3): grace before a pending intent is re-queried, and the
# max age after which a still-pending intent is forced to `timeout`. Duration format (e.g. 5m, 30m).
beatz.payment.timeout.poll-after=${BEATZ_PAYMENT_TIMEOUT_POLL_AFTER:5m}
beatz.payment.timeout.max-window=${BEATZ_PAYMENT_TIMEOUT_MAX_WINDOW:30m}

# ============ PlatformSettings seed constants (PRD §5.2) ============
beatz.platform.fee-pct=${BEATZ_PLATFORM_FEE_PCT:30}
beatz.platform.creator-share-pct=${BEATZ_CREATOR_SHARE_PCT:70}
beatz.platform.tip-fee-pct=${BEATZ_TIP_FEE_PCT:10}
beatz.platform.bundle-discount-pct=${BEATZ_BUNDLE_DISCOUNT_PCT:24}
beatz.platform.service-fee=${BEATZ_SERVICE_FEE:0.50}
beatz.platform.min-payout=${BEATZ_MIN_PAYOUT:10}
beatz.platform.payout-day=${BEATZ_PAYOUT_DAY:FRIDAY}

# ============ Admin RBAC scope map (OQ-1 defaults — config-driven, not hard-coded) ============
# Roles that are allowed to perform each admin action.
# Comma-separated kebab-case role strings matching the JWT groups claim.
beatz.rbac.team-list-roles=${BEATZ_RBAC_TEAM_LIST_ROLES:super-admin,finance,moderator,editor,support}
beatz.rbac.team-mutate-roles=${BEATZ_RBAC_TEAM_MUTATE_ROLES:super-admin}
beatz.rbac.verify-roles=${BEATZ_RBAC_VERIFY_ROLES:super-admin,moderator}
beatz.rbac.data-export-roles=${BEATZ_RBAC_DATA_EXPORT_ROLES:super-admin}
beatz.rbac.compliance-roles=${BEATZ_RBAC_COMPLIANCE_ROLES:super-admin}
beatz.rbac.audit-read-roles=${BEATZ_RBAC_AUDIT_READ_ROLES:super-admin}

# ============ Profile differences ============
%dev.quarkus.log.console.json=false
%test.quarkus.mailer.mock=true
%test.quarkus.flyway.clean-at-start=true
# Disable the platform scheduler in tests so background ticks (payments recon/timeout poll, go-live,
# etc.) do not race with assertions; integration tests drive the jobs explicitly via their ports.
%test.quarkus.scheduler.enabled=false
%prod.quarkus.log.console.json=true
%prod.beatz.seed.enabled=false

# ============ JaCoCo / quarkus-jacoco (coverage merge) ============
# quarkus-jacoco captures @QuarkusTest coverage inside the Quarkus isolated
# classloader and writes to target/jacoco-quarkus.exec by default. By pointing
# it at the same file the jacoco-maven-plugin prepare-agent uses (target/jacoco.exec)
# and setting reuse-data-file=true, the IT exec data is APPENDED to — not
# overwriting — the surefire unit-test data. The merged file is then read by the
# jacoco:report and jacoco:check goals in the coverage Maven profile (-Pcoverage).
%test.quarkus.jacoco.data-file=target/jacoco.exec
%test.quarkus.jacoco.reuse-data-file=true
