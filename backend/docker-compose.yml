# docker-compose.yml — BeatzClik backend local stack (Phase 0 bootstrap)
# Place in backend/; run from backend/ or the repo root via smoke.sh.
# Based on environments-and-deployment.md §2.1 (canonical topology).
#
# Phase 0 includes: db (postgres:16), objectstore (MinIO), createbuckets, mail
# (Mailpit), sms (in-repo SMS capture stub, WU-NOT-2 / OQ-9), and app
# (Dockerfile.jvm). Redis and transcoder remain optional.
#
# Boot: ./mvnw package -DskipTests && docker compose up -d --build
# Tear down: docker compose down -v

name: beatzclik

services:
  # ---------------------------------------------------------------------------
  # Postgres 16 — canonical relational store
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: beatz
      POSTGRES_PASSWORD: beatz
      POSTGRES_DB: beatzmedia
    # Port not exposed to host: the app connects via 'db:5432' on the
    # internal Docker network. Expose to host (e.g. 15432:5432) only if
    # direct psql access from the host is needed (avoids conflicts with
    # any local Postgres on port 5432).
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beatz -d beatzmedia"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO — local S3-compatible object store (media originals + HLS delivery)
  # ---------------------------------------------------------------------------
  objectstore:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # createbuckets — one-shot mc job to initialise the two MinIO buckets
  # ---------------------------------------------------------------------------
  createbuckets:
    image: minio/mc:latest
    depends_on:
      objectstore:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://objectstore:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/beatz-media-originals &&
      mc mb --ignore-existing local/beatz-media-delivery &&
      mc anonymous set none local/beatz-media-originals &&
      mc anonymous set none local/beatz-media-delivery &&
      echo 'buckets ready';
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # Mailpit — local SMTP capture (no real mail sent in dev)
  # ---------------------------------------------------------------------------
  mail:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # sms — in-repo SMS capture stub (WU-NOT-2, PRD OQ-9 default): a tiny stdlib-only
  # Python HTTP server (backend/tools/sms-capture-stub/server.py), analogous to
  # Mailpit but for SMS. NEVER a real provider call in dev/test. Source lives in
  # this repo (mounted read-only), so no external image publish is required.
  # ---------------------------------------------------------------------------
  sms:
    image: python:3-alpine
    working_dir: /app
    volumes:
      - ./tools/sms-capture-stub:/app:ro
    command: ["python3", "server.py"]
    ports:
      - "8026:8026" # HTTP send endpoint + capture UI
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8026/livez')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # app — the Quarkus JVM image built from Dockerfile.jvm
  # Build the jar first: ./mvnw package -DskipTests
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    depends_on:
      db:
        condition: service_healthy
      objectstore:
        condition: service_healthy
      mail:
        condition: service_healthy
      sms:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      QUARKUS_PROFILE: dev
      # --- datasource ---
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/beatzmedia
      QUARKUS_DATASOURCE_USERNAME: beatz
      QUARKUS_DATASOURCE_PASSWORD: beatz
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      # --- object store (MinIO) ---
      BEATZ_S3_ENDPOINT: http://objectstore:9000
      BEATZ_S3_ACCESS_KEY: minioadmin
      BEATZ_S3_SECRET_KEY: minioadmin
      BEATZ_S3_BUCKET_ORIGINALS: beatz-media-originals
      BEATZ_S3_BUCKET_DELIVERY: beatz-media-delivery
      BEATZ_SIGNED_URL_TTL_SECONDS: "300"
      BEATZ_PREVIEW_SECONDS: "30"
      # --- mail (Mailpit) ---
      QUARKUS_MAILER_HOST: mail
      QUARKUS_MAILER_PORT: "1025"
      QUARKUS_MAILER_FROM: no-reply@beatzclik.local
      QUARKUS_MAILER_MOCK: "false"
      # --- sms (in-repo capture stub, WU-NOT-2 / OQ-9) ---
      BEATZ_SMS_ENDPOINT: http://sms:8026/send
      # --- jwt (dev — empty keys; real keys come from .env or GitHub secrets) ---
      BEATZ_JWT_PRIVATE_KEY: ${BEATZ_JWT_PRIVATE_KEY:-}
      BEATZ_JWT_PUBLIC_KEY: ${BEATZ_JWT_PUBLIC_KEY:-}
      # --- payment providers: dev sandbox / disabled ---
      BEATZ_PAYMENT_WEBHOOK_SECRET: dev-webhook-secret
      # --- platform settings seeds ---
      BEATZ_PLATFORM_FEE_PCT: "30"
      BEATZ_CREATOR_SHARE_PCT: "70"
      BEATZ_TIP_FEE_PCT: "10"
      BEATZ_BUNDLE_DISCOUNT_PCT: "24"
      BEATZ_SERVICE_FEE: "0.50"
      BEATZ_MIN_PAYOUT: "10"
      BEATZ_PAYOUT_DAY: FRIDAY
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
