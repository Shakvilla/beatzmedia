    # seed-from-max at startup) AND a UNIQUE constraint on order_ref, plus a collision test. Source
    # of the unsafe impl: platform/adapter/out/persistence/Uuidv7IdGenerator.java:24,33 (PR #10).
    # Carryover from WU-PAY-1 review (PR #54, security + code sign-off): InitiateCharge deliberately
    # does NOT verify orderRef/amount ownership — that authz is THIS WU's hard requirement. Checkout
    # is the intended caller of InitiateCharge (payments ADD §8a); before calling it, verify the
    # orderRef + amount belong to the authenticated caller's own pending order/cart, else 404 (§2.2).
    # Also add per-account rate limiting (429 + Retry-After) to the checkout/charge money path
    # (security-authz §6) and an upper-bound validation on charge amount (avoid unmapped 500 on absurd
    # values; bound from PlatformSettings). See PaymentIntentResource / InitiateChargeService.
    # Carryover from WU-COM-1 review (PR #56, code + security sign-off): the cart persists prices but
    # checkout MUST re-price server-side and never trust cart-stored amounts (G1 — DoD item 2; add a
    # tampered-price test; grant ownership only on settlement, INV-1). (G2) Replace the interim
    # CatalogPricingServiceAdapter.priceFromMetadata echo (client-supplied metadata.priceMinor for
    # episode/season-pass/ticket/store) with authoritative price-lookup input ports when WU-POD-1 /
    # WU-EVT-1 / WU-STO-1 ship. (G3 — payments-security decision, security-reviewer sign-off REQUIRED)
    # WU-COM-2 does NOT depend on POD-1/EVT-1/STO-1, so checkout could charge real money on
    # client-supplied ticket/store/episode/season-pass prices: checkout must EITHER gate/reject those
    # kinds until the owning module exists, OR explicitly accept the residual spoofing risk with a
    # documented ceiling (cap trusted priceMinor / ops allowlist). Do not ship real-money checkout for
    # those kinds without an explicit decision.
