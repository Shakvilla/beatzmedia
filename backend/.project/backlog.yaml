# BeatzClik backend — Work Unit backlog (single source of truth for the autonomous loop)
#
# This registry drives the build. The tech-lead / scrum-master read it to find the next
# READY work unit (status: todo AND every id in depends_on has status: done), respecting phase
# order. Each WU maps to PRD §8 and a module Architecture Design Doc under backend/docs/architecture/.
#
# STATUS values: todo | in_progress | in_review | blocked | done
# Update via scripts/progress.sh or by the scrum-master agent. Keep this file the truth; never
# mark done until the WU's PR is merged and CI is green.
#
# human_gate: open questions (PRD §12) that need a human decision. The loop applies the documented
# DEFAULT and proceeds, but flags the WU in status reports so a human can confirm/override.

meta:
  project: beatzmedia
  prd: ../docs/../../BACKEND-PRD.md      # repo-root BACKEND-PRD.md
  docs: ../docs/README.md
  phases:
    0: "Foundations (platform kernel, scheduler, media, audit)"
    1: "Identity & Catalog"
    2: "Commerce & Payments core"
    3: "Money completion (payouts/KYC, refunds/disputes)"
    4: "Surfaces & proposals (store, podcasts, events, notifications, studio, admin, analytics)"

