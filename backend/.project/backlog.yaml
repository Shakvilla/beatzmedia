    # (Postgres SEQUENCE per year or a counter table), or at minimum seed the AtomicLong from
    # SELECT max(order_ref) at startup AND add a UNIQUE constraint on the order_ref column so a
    # collision fails loudly instead of silently duplicating. Add a test. Conventions §3 requires
    # order_ref uniqueness; the current impl is unsafe under horizontal scaling / rapid restarts.
    # Source: platform/adapter/out/persistence/Uuidv7IdGenerator.java:24,33
