    # Hardening carryover from WU-IDN-4 review (PR #27, code-review + security-review sign-off):
    # the last-super-admin guard in ChangeAdminRoleService/RemoveAdminService is a check-then-act
    # (findAdminMember -> countAdminsWithRole(SUPER_ADMIN) -> update/delete) that is NOT atomic under
